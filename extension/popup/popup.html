<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recall Popup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
html, body {
  background: #0f1117; color: #f8fafc; 
  font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
  width: 400px; margin: 0;
}

.popup {
  width: 400px; max-height: 600px; overflow-y: auto; padding: 0;
}

.popup-header {
  display: flex; justify-content: space-between; align-items: center; 
  padding: 12px 16px;
  border-bottom: 1px solid #252c3a; background: #181c24;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

#screenAuth, #screenSetup, #screenProgress, #screenQuiz {
  padding: 20px 16px;
}

#screenHome {
  padding: 12px 16px;
}

.field input, .field textarea {
  background: #1e2330; border: 1px solid #252c3a; border-radius: 8px;
  color: #f8fafc; padding: 8px 12px; font-size: 14px; font-family: inherit;
  outline: none; width: 100%; box-sizing: border-box;
  transition: border-color 150ms, box-shadow 150ms;
}

.field input:focus, .field textarea:focus {
  border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

.field label {
  font-size: 11px; font-family: monospace; text-transform: uppercase;
  letter-spacing: 0.08em; color: #6b7a99; margin-bottom: 6px; display: block;
}

.btn {
  background: #3b82f6; color: #f8fafc; border-radius: 8px; 
  padding: 10px 14px; font-size: 14px; font-weight: 500;
  border: none; cursor: pointer; width: 100%;
  transition: filter 120ms;
}

.btn:hover {
  filter: brightness(1.1);
}

.btn:disabled {
  opacity: 0.4; cursor: not-allowed;
}

.btn-start {
  background: #1e2330; border: 1px solid #252c3a; color: #f8fafc;
}

.google-btn {
  background: #181c24; border: 1px solid #252c3a; color: #f8fafc;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.google-btn:hover {
  background: #1e2330;
}

.link-btn {
  background: none; border: none; color: #3b82f6; font-size: 13px;
  cursor: pointer; padding: 0; text-align: center; width: 100%;
}

.divider {
  display: flex; align-items: center; gap: 12px; margin: 12px 0;
  color: #6b7a99; font-size: 12px;
}

.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px; background: #252c3a;
}

.home-header {
  display: none;
}

.nav-btn {
  width: 100%; display: flex; align-items: flex-start; gap: 12px;
  padding: 12px; border-radius: 10px; border: 1px solid #252c3a;
  background: #181c24; cursor: pointer; text-align: left;
  transition: background 150ms, border-color 150ms;
}

.nav-btn:hover {
  background: #1e2330; border-color: rgba(59,130,246,0.4);
}

.nav-btn-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
}

.nav-btn-primary .nav-btn-icon {
  background: rgba(59,130,246,0.15);
}

.nav-btn-secondary .nav-btn-icon {
  background: rgba(59,130,246,0.1);
}

.progress-card {
  background: #181c24; border: 1px solid #252c3a; border-radius: 12px;
  padding: 16px; margin: 16px;
}

.step {
  display: flex; align-items: center; gap: 10px; font-size: 13px; color: #6b7a99;
  opacity: 0.6; transition: opacity 200ms;
}

.step.is-on, .step.is-done {
  opacity: 1; color: #f8fafc;
}

.status-icon {
  width: 18px; height: 18px; border-radius: 50%;
  background: #252c3a; border: 1px solid #252c3a; 
  color: transparent; display: grid; place-items: center; font-size: 11px;
  flex-shrink: 0; transition: all 160ms;
}

.step.is-on .status-icon, .step.is-done .status-icon {
  background: #3b82f6; border-color: #3b82f6; color: #f8fafc;
}

.quiz-card {
  background: #181c24; border: 1px solid #252c3a; border-radius: 12px;
  padding: 14px; margin: 8px 0 12px;
}

.quiz-option {
  width: 100%; text-align: left; padding: 9px 12px;
  border: 1px solid #252c3a; border-radius: 8px;
  background: #1e2330; color: #f8fafc; font-size: 13px; cursor: pointer;
  transition: all 150ms; font-family: inherit;
}

.quiz-option:hover:not(:disabled) {
  border-color: #3b82f6; background: rgba(59,130,246,0.08);
}

.quiz-option.is-selected {
  border-color: #3b82f6; background: rgba(59,130,246,0.12); color: #f8fafc;
}

.quiz-progress-bar-track {
  height: 3px; background: #252c3a; border-radius: 2px;
}

.quiz-progress-bar-fill {
  height: 3px; background: #3b82f6; border-radius: 2px;
  transition: width 300ms ease;
}

.quiz-answer {
  background: #1e2330; border: 1px solid #252c3a; border-radius: 8px;
  color: #f8fafc; padding: 8px 12px; font-size: 14px; font-family: inherit;
  outline: none; width: 100%; box-sizing: border-box;
  transition: border-color 150ms, box-shadow 150ms;
}

.quiz-answer:focus {
  border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

.error {
  font-size: 12px; color: #f87171; min-height: 16px; margin-top: 4px;
}

.back-btn {
  background: none; border: none; color: #6b7a99; font-size: 13px;
  cursor: pointer; padding: 8px 0; text-align: center; width: 100%;
  transition: color 150ms;
}

.back-btn:hover {
  color: #f8fafc;
}
    </style>
  </head>
  <body>
    <main class="popup" id="popupRoot">
      <div class="popup-header" id="popupHeader">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:24px;height:24px;border-radius:6px;background:rgba(59,130,246,0.2);
                      display:grid;place-items:center">
            <span style="color:#3b82f6;font-size:12px;font-weight:700">R</span>
          </div>
          <span style="font-size:13px;font-weight:600;letter-spacing:-0.03em">RECALL</span>
        </div>
        <button class="btn" id="headerLogoutBtn" type="button"
          style="width:auto;padding:4px 8px;font-size:10px;font-family:monospace;
                 text-transform:uppercase;letter-spacing:0.08em;background:transparent;
                 border:none;color:#6b7a99;display:none">
          Logout
        </button>
      </div>
      <section
        class="screen active"
        id="screenAuth"
        aria-label="Authentication"
      >
        <div style="padding-top: 4px;">
          <p class="subtext">Sign in to continue</p>

          <form class="form" id="authForm" novalidate>
          <div class="field">
            <label for="authEmail">Email</label>
            <input id="authEmail" name="email" type="email" required />
            <div class="error" id="authEmailError"></div>
          </div>

          <div class="field" id="authNameField" style="display: none">
            <label for="authName">Name</label>
            <input id="authName" name="name" type="text" />
            <div class="error" id="authNameError"></div>
          </div>

          <div class="field">
            <label for="authPassword">Password</label>
            <input id="authPassword" name="password" type="password" required />
            <div class="error" id="authPasswordError"></div>
          </div>

          <button class="btn btn-generate" id="authSubmitBtn" type="submit">
            Login
          </button>
          <div class="error" id="authFormError"></div>

          <div class="divider">OR</div>

          <button class="btn google-btn" id="googleAuthBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path
                fill="#4285F4"
                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
              />
              <path
                fill="#34A853"
                d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
              />
              <path
                fill="#FBBC05"
                d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"
              />
              <path
                fill="#EA4335"
                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              />
            </svg>
            Continue with Google
          </button>

          <button class="link-btn" id="authToggle" type="button">
            Don't have an account? Register
          </button>
        </form>
      </section>

      <section class="screen" id="screenHome" aria-label="Home">
        <div class="screen-body" style="padding: 0 16px 16px;">
          <div class="nav-buttons">
          <button
            class="nav-btn nav-btn-primary"
            id="addTopicBtn"
            type="button"
          >
            <div class="nav-btn-icon">📝</div>
            <div class="nav-btn-content">
              <div class="nav-btn-title">Add Topic</div>
              <div class="nav-btn-desc">
                Create new study cards from your notes
              </div>
            </div>
          </button>

          <button
            class="nav-btn nav-btn-secondary"
            id="dashboardBtn"
            type="button"
          >
            <div class="nav-btn-icon">📊</div>
            <div class="nav-btn-content">
              <div class="nav-btn-title">Dashboard</div>
              <div class="nav-btn-desc">View all your sources and cards</div>
            </div>
          </button>
        </div>
      </section>

      <section class="screen" id="screenSetup" aria-label="Setup Form">
        <p class="subtext" id="setupStatus"></p>
        <form class="form" id="setupForm" novalidate>
          <div class="field">
            <label for="topicInput">Topic name</label>
            <input id="topicInput" name="topic" type="text" required />
            <div class="error" id="topicError"></div>
          </div>

          <div class="field">
            <label for="notesInput">Notes</label>
            <textarea
              id="notesInput"
              name="notes"
              placeholder="Paste your notes here..."
            ></textarea>
            <div class="error" id="notesError"></div>
          </div>

          <div class="field">
            <label for="examDateInput">Exam date</label>
            <input id="examDateInput" name="examDate" type="date" required />
            <div class="error" id="dateError"></div>
          </div>

          <button class="btn btn-generate" id="generateBtn" type="submit">
            Generate
          </button>
          <div class="error" id="formError"></div>
          <button class="back-btn" id="backToHomeBtn" type="button">
            ← Back to Home
          </button>
        </form>
      </section>

      <section class="screen" id="screenProgress" aria-label="Agent Progress">
        <div class="progress-card">
          <h2>Preparing your cards...</h2>
          <p class="subtext" id="progressStatus">Connecting to backend...</p>
          <div class="steps" id="stepsList">
            <div class="step" data-step="0">
              <span class="status-icon">✓</span>
              <span>Analysing &amp; enriching notes</span>
            </div>
            <div class="step" data-step="1">
              <span class="status-icon">✓</span>
              <span>Generating MCQs</span>
            </div>
            <div class="step" data-step="2">
              <span class="status-icon">✓</span>
              <span>Generating short cards</span>
            </div>
          </div>
        </div>
      </section>

      <section
        class="screen"
        id="screenQuiz"
        aria-label="Calibration Quiz Placeholder"
      >
        <h2>Quick Calibration</h2>
        <p class="subtext">Answer a few cards to personalise your schedule</p>
        <div class="quiz-card" id="quizCard">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <span class="subtext" id="quizMeta" style="margin:0;white-space:nowrap">Card 1</span>
            <div class="quiz-progress-bar-track" style="flex:1">
              <div class="quiz-progress-bar-fill" id="quizProgressBar" style="width:0%"></div>
            </div>
          </div>
          <p class="quiz-prompt" id="quizPrompt">Loading cards...</p>
          <div class="quiz-options" id="quizOptions"></div>
          <input
            class="quiz-answer"
            id="quizAnswerInput"
            type="text"
            placeholder="Type your answer"
          />
          <p class="subtext" id="quizFeedback"></p>
        </div>
        <div class="quiz-actions">
          <button class="btn btn-secondary" id="quizSubmitBtn" type="button">
            Check
          </button>
          <button class="btn btn-start" id="quizNextBtn" type="button">
            Next
          </button>
        </div>
      </section>
    </main>

    <script src="../scripts/popup/popup-sm2.js"></script>
    <script src="../scripts/popup/popup-storage.js"></script>
    <script src="../scripts/popup/popup-text-utils.js"></script>
    <script src="../scripts/popup/popup.js"></script>
  </body>
</html>
