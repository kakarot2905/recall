<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recall Popup</title>
    <style>
      :root {
        --bg: #fbfbfb;
        --accent-light: #e8f9ff;
        --blue: #c4d9ff;
        --purple: #c5baff;
        --text: #1e1e1e;
        --muted: #6d7280;
        --border: #d7dbe3;
        --inactive: #bfc5d1;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 400px;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", sans-serif;
      }

      body {
        min-height: 100vh;
      }

      .popup {
        width: 400px;
        max-height: 600px;
        overflow-y: auto;
        padding: 20px;
      }

      .screen {
        display: none;
        opacity: 0;
        transition: opacity 220ms ease;
      }

      .screen.active {
        display: block;
        opacity: 1;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.5px;
        margin-bottom: 18px;
      }

      h2 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .subtext {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
        margin-bottom: 16px;
      }

      .form {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 13px;
        color: #3b4151;
        font-weight: 600;
      }

      .field input,
      .field textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--white);
        color: var(--text);
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
        transition:
          border-color 150ms ease,
          box-shadow 150ms ease;
      }

      .field textarea {
        resize: vertical;
        min-height: 110px;
        max-height: 220px;
        line-height: 1.45;
      }

      .field input:focus,
      .field textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 2px rgba(196, 217, 255, 0.3);
      }

      .field .error {
        font-size: 12px;
        color: #8e3361;
        min-height: 16px;
      }

      .btn {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 700;
        color: #1f1f1f;
        cursor: pointer;
        transition:
          transform 120ms ease,
          filter 120ms ease;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-generate {
        background: var(--purple);
        margin-top: 2px;
      }

      .btn-generate:hover,
      .btn-start:hover {
        filter: brightness(0.97);
      }

      .progress-card {
        background: var(--accent-light);
        border: 1px solid #dceef6;
        border-radius: 16px;
        padding: 16px;
      }

      .steps {
        margin-top: 8px;
        display: grid;
        gap: 10px;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #2d3545;
        opacity: 0.7;
        transition: opacity 200ms ease;
      }

      .step.is-on {
        opacity: 1;
      }

      .status-icon {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        flex: 0 0 20px;
        border: 1px solid #d6d9e0;
        background: var(--inactive);
        color: transparent;
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        transition:
          background 160ms ease,
          color 160ms ease,
          border-color 160ms ease;
      }

      .step.is-on .status-icon,
      .step.is-done .status-icon {
        background: var(--purple);
        border-color: var(--purple);
        color: #2a204a;
      }

      .placeholder-card {
        min-height: 170px;
        border-radius: 14px;
        border: 1px solid var(--blue);
        background: var(--accent-light);
        margin: 8px 0 16px;
      }

      .quiz-card {
        min-height: 170px;
        border-radius: 14px;
        border: 1px solid var(--blue);
        background: var(--accent-light);
        margin: 8px 0 12px;
        padding: 12px;
      }

      .quiz-prompt {
        font-size: 14px;
        font-weight: 600;
        color: #222b3d;
        line-height: 1.4;
        margin-bottom: 10px;
      }

      .quiz-options {
        display: grid;
        gap: 8px;
      }

      .quiz-option {
        border: 1px solid var(--border);
        background: var(--white);
        border-radius: 10px;
        padding: 9px 10px;
        text-align: left;
        cursor: pointer;
        font-size: 13px;
      }

      .quiz-option.is-selected {
        border-color: #809aff;
        background: #eef2ff;
      }

      .quiz-answer {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--white);
        color: var(--text);
        padding: 10px;
        font-size: 13px;
      }

      .quiz-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .btn-secondary {
        background: #dbe3ff;
      }

      .btn-start {
        background: var(--blue);
      }

      .link-btn {
        background: none;
        border: none;
        color: #6374d6;
        cursor: pointer;
        text-decoration: underline;
        font-size: 13px;
        padding: 0;
        margin-top: 8px;
      }

      .google-btn {
        background: var(--white);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 12px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Home Screen Styles */
      .home-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      .home-header h1 {
        font-size: 24px;
        margin: 0;
      }

      .user-info {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .user-email {
        font-size: 11px;
        color: var(--muted);
      }

      .logout-btn {
        background: none;
        border: none;
        color: #8e3361;
        cursor: pointer;
        font-size: 11px;
        text-decoration: underline;
        padding: 0;
        margin-top: 2px;
      }

      .nav-buttons {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .nav-btn {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        background: var(--white);
        cursor: pointer;
        text-align: left;
        transition: all 150ms ease;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-btn:hover {
        border-color: var(--blue);
        background: #f8faff;
      }

      .nav-btn-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        font-size: 18px;
        flex-shrink: 0;
      }

      .nav-btn-primary .nav-btn-icon {
        background: var(--purple);
      }

      .nav-btn-secondary .nav-btn-icon {
        background: var(--blue);
      }

      .nav-btn-content {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-btn-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .nav-btn-desc {
        font-size: 12px;
        color: var(--muted);
      }

      .back-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        padding: 8px 0;
        margin-top: 4px;
        text-align: center;
        transition: color 150ms ease;
      }

      .back-btn:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="popup" id="popupRoot">
      <section
        class="screen active"
        id="screenAuth"
        aria-label="Authentication"
      >
        <h1>RECALL</h1>
        <p class="subtext">Sign in to continue</p>

        <form class="form" id="authForm" novalidate>
          <div class="field">
            <label for="authEmail">Email</label>
            <input id="authEmail" name="email" type="email" required />
            <div class="error" id="authEmailError"></div>
          </div>

          <div class="field" id="authNameField" style="display: none">
            <label for="authName">Name</label>
            <input id="authName" name="name" type="text" />
            <div class="error" id="authNameError"></div>
          </div>

          <div class="field">
            <label for="authPassword">Password</label>
            <input id="authPassword" name="password" type="password" required />
            <div class="error" id="authPasswordError"></div>
          </div>

          <button class="btn btn-generate" id="authSubmitBtn" type="submit">
            Login
          </button>
          <div class="error" id="authFormError"></div>

          <div class="divider">OR</div>

          <button class="btn google-btn" id="googleAuthBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path
                fill="#4285F4"
                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
              />
              <path
                fill="#34A853"
                d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
              />
              <path
                fill="#FBBC05"
                d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"
              />
              <path
                fill="#EA4335"
                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              />
            </svg>
            Continue with Google
          </button>

          <button class="link-btn" id="authToggle" type="button">
            Don't have an account? Register
          </button>
        </form>
      </section>

      <section class="screen" id="screenHome" aria-label="Home">
        <div class="home-header">
          <h1>RECALL</h1>
          <div class="user-info">
            <div class="user-name" id="userName">User</div>
            <div class="user-email" id="userEmail">user@email.com</div>
            <button class="logout-btn" id="logoutBtn" type="button">
              Logout
            </button>
          </div>
        </div>

        <div class="nav-buttons">
          <button
            class="nav-btn nav-btn-primary"
            id="addTopicBtn"
            type="button"
          >
            <div class="nav-btn-icon">📝</div>
            <div class="nav-btn-content">
              <div class="nav-btn-title">Add Topic</div>
              <div class="nav-btn-desc">
                Create new study cards from your notes
              </div>
            </div>
          </button>

          <button
            class="nav-btn nav-btn-secondary"
            id="dashboardBtn"
            type="button"
          >
            <div class="nav-btn-icon">📊</div>
            <div class="nav-btn-content">
              <div class="nav-btn-title">Dashboard</div>
              <div class="nav-btn-desc">View all your sources and cards</div>
            </div>
          </button>
        </div>
      </section>

      <section class="screen" id="screenSetup" aria-label="Setup Form">
        <h1>RECALL</h1>
        <p class="subtext" id="setupStatus"></p>
        <form class="form" id="setupForm" novalidate>
          <div class="field">
            <label for="topicInput">Topic name</label>
            <input id="topicInput" name="topic" type="text" required />
            <div class="error" id="topicError"></div>
          </div>

          <div class="field">
            <label for="notesInput">Notes</label>
            <textarea
              id="notesInput"
              name="notes"
              placeholder="Paste your notes here..."
            ></textarea>
            <div class="error" id="notesError"></div>
          </div>

          <div class="field">
            <label for="examDateInput">Exam date</label>
            <input id="examDateInput" name="examDate" type="date" required />
            <div class="error" id="dateError"></div>
          </div>

          <button class="btn btn-generate" id="generateBtn" type="submit">
            Generate
          </button>
          <div class="error" id="formError"></div>
          <button class="back-btn" id="backToHomeBtn" type="button">
            ← Back to Home
          </button>
        </form>
      </section>

      <section class="screen" id="screenProgress" aria-label="Agent Progress">
        <div class="progress-card">
          <h2>Preparing your cards...</h2>
          <p class="subtext" id="progressStatus">Connecting to backend...</p>
          <div class="steps" id="stepsList">
            <div class="step" data-step="0">
              <span class="status-icon">✓</span>
              <span>Analysing &amp; enriching notes</span>
            </div>
            <div class="step" data-step="1">
              <span class="status-icon">✓</span>
              <span>Generating MCQs</span>
            </div>
            <div class="step" data-step="2">
              <span class="status-icon">✓</span>
              <span>Generating short cards</span>
            </div>
          </div>
        </div>
      </section>

      <section
        class="screen"
        id="screenQuiz"
        aria-label="Calibration Quiz Placeholder"
      >
        <h2>Quick Calibration</h2>
        <p class="subtext">Answer a few cards to personalise your schedule</p>
        <div class="quiz-card" id="quizCard">
          <p class="subtext" id="quizMeta">Card 1</p>
          <p class="quiz-prompt" id="quizPrompt">Loading cards...</p>
          <div class="quiz-options" id="quizOptions"></div>
          <input
            class="quiz-answer"
            id="quizAnswerInput"
            type="text"
            placeholder="Type your answer"
          />
          <p class="subtext" id="quizFeedback"></p>
        </div>
        <div class="quiz-actions">
          <button class="btn btn-secondary" id="quizSubmitBtn" type="button">
            Check
          </button>
          <button class="btn btn-start" id="quizNextBtn" type="button">
            Next
          </button>
        </div>
      </section>
    </main>

    <script src="../scripts/popup/popup-sm2.js"></script>
    <script src="../scripts/popup/popup-storage.js"></script>
    <script src="../scripts/popup/popup-text-utils.js"></script>
    <script src="../scripts/popup/popup.js"></script>
  </body>
</html>
